<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Lora:ital,wght@0,400;0,600;1,400&display=swap"
    rel="stylesheet"
  />

  <link href="/css/landing.css" rel="stylesheet" type="text/css" media="all" />

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f7f4ee;
      color: #1d1d1d;
      font-family: "Lora", serif;
      padding: 2rem;
      box-sizing: border-box;
    }

    .container {
      max-width: 640px;
      text-align: center;
    }

    h1 {
      font-family: "Plus Jakarta Sans", sans-serif;
      font-size: clamp(2.8rem, 7vw, 5rem);
      margin: 0 0 1rem;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    p {
      font-size: 1.1rem;
      line-height: 1.8;
      margin: 0 0 1.5rem;
      color: #444;
    }

    a {
      display: inline-block;
      text-decoration: none;
      color: #111;
      font-family: "Plus Jakarta Sans", sans-serif;
      font-weight: 700;
      border-bottom: 2px solid #111;
      padding-bottom: 0.15rem;
      transition: opacity 0.2s ease;
    }

    a:hover {
      opacity: 0.65;
    }

    .code {
      font-family: monospace;
      font-size: 0.95rem;
      opacity: 0.7;
      margin-top: 2rem;
    }
  </style>
</head>

<body>
  <main class="container">
    <h1>404</h1>

    <p>
      The page you requested could not be found.
    </p>

    <p>
      It may have been moved, renamed, deleted, or never existed.
    </p>

    <a href="/">Return Home</a>

    <div class="code">
      HTTP 404 — Not Found
    </div>
  </main>
</body>
</html>
